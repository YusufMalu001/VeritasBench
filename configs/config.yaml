random_seed: 42
temperature: 0.2
max_new_tokens: 512
num_prompts: 25
human_eval_sample_size: 5

models_to_evaluate:
  - name: "mistralai/Mistral-7B-Instruct-v0.3"
    type: "huggingface"
    capabilities:
      supports_chat: false
      supports_text_generation: true

judge_model:
  name: "Qwen/Qwen3-32B"
  type: "huggingface"
  capabilities:
    supports_chat: true
    supports_text_generation: true

results_dir: "./results"
